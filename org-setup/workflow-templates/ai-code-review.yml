name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    permissions:
      pull-requests: write
      contents: read
    uses: BLEND360/code-sage-code-review/.github/workflows/ai-review-reusable.yml@main
    with:
      # Choose your AI provider: 'openai' (default) or 'claude'
      ai_provider: 'openai'

      # (Optional) Path to your team's review guidelines
      # Uncomment and customize if you have custom rules:
      # review_guidelines_path: '.github/review-guidelines.md'

      # Enable automatic fallback to the other provider if primary fails
      enable_fallback: true
    secrets:
      # Add these secrets in: Settings → Secrets and variables → Actions
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
