name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Read global rules
        id: rules
        run: |
          echo "RULES<<EOF" >> $GITHUB_OUTPUT
          cat .github/review-guidelines.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get PR description
        id: pr
        run: |
          echo "PR_BODY<<EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Call AI for review
        id: ai
        run: |
          PROMPT="You are a senior code reviewer.

          GLOBAL RULES:
          ${{ steps.rules.outputs.RULES }}

          PR CONTEXT:
          ${{ steps.pr.outputs.PR_BODY }}

          CODE CHANGES:
          $(cat diff.txt)

          Review for:
          - Bugs
          - Security issues
          - Code quality
          - Missing validations
          - Violations of rules

          Give concise actionable comments."

          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [{\"role\": \"user\", \"content\": \"$PROMPT\"}],
              \"temperature\": 0.3
            }" | jq -r '.choices[0].message.content')

          echo "REVIEW<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.ai.outputs.REVIEW }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## 🤖 AI Code Review\n\n" + review
            });